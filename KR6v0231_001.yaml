body:
  text: 蓋大魏故昭玄沙門大統令法師之墓誌銘銘魏故昭玄沙門大統僧令法師墓誌銘法師緣姓杜京兆人也幼而敏惠志尚清虛爰在兒童脫俗歸道學既多聞善亦兼濟散袟濡翰怡然自得若其涉獵群品富同河漢討論微賾殆剖秋豪良以三空靡遺九典咸達居室遐應鳴皋自遠高祖光宅土中憲章大備存心釋氏注意法輪由此聞風欽想發於寤寐嘉命苹心荷錫來遊至若振塵式乾洞窮幽旨故以造膝嗟善徘徊定倦武明之世禮遇彌隆乃以法師為嵩高閑居寺主飲泉庇樹嘯想煙霞一丘一壑得之懷抱實有高蹈之志非無遂往之情雖跡出塵中而尚羈世綱尋被徵為沙門都維那屢自陳遜終不見許既弗獲以禮便同之畏法莊帝聿興仍轉為統自居斯任彌歷數朝事無蹔壅眾咸歸德今上龍飛固乞收退頻煩切至久而方允於是隱輪養志保素任真形影雖留心神已化俄遘篤疾奄然辭世行年八十有一臨終自得安然若歸天子追悼敕主書任元景詣寺宣慰二月三日丙辰窆於芒山之陽弟子智微道遜覺意等痛慈顏之長往懼大義之將乖興言永慕乃作銘曰天生英德志逸旻穹孤拔塵表獨得環中道与物合行共時融百代飛譽千載垂風道逸繢庭聲飛未闕見重高帝尺書屢發雅論移天清談動月其人雖往斯音未歇大魏永熙三年歲次甲寅二月甲寅朔三日丙辰
